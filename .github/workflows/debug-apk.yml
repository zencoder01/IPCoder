name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build local CodeMirror bundle
        run: npm run build:editor

      - name: Generate Android project
        run: CI=1 npx expo prebuild --platform android --no-install

      - name: Patch AsyncStorage local Maven repo
        run: |
          REPO_LINE='    maven { url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo") }'
          if ! grep -Fq '@react-native-async-storage/async-storage/android/local_repo' android/build.gradle; then
            awk -v repo="${REPO_LINE}" '
              /allprojects[[:space:]]*\{/ {in_all=1}
              in_all && /repositories[[:space:]]*\{/ {print; print repo; next}
              {print}
            ' android/build.gradle > android/build.gradle.tmp
            mv android/build.gradle.tmp android/build.gradle
          fi

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPCoder-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
